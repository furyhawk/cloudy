apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: admin-auth
  namespace: swarm-converted
spec:
  basicAuth:
    secret: traefik-basic-auth

---

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: swarm-converted
spec:
  rateLimit:
    average: 384
    burst: 128
    period: 10s

---

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: no-www
  namespace: swarm-converted
spec:
  redirectRegex:
    regex: ^https://www\.(.*)$
    replacement: https://$1
    permanent: true

---

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-resume
  namespace: swarm-converted
spec:
  redirectRegex:
    regex: ^https://resume\.REPLACE_DOMAIN/(.*)
    replacement: https://info.REPLACE_DOMAIN/resume/$1
    permanent: true

---

apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-blog
  namespace: swarm-converted
spec:
  redirectRegex:
    regex: ^https://blog\.REPLACE_DOMAIN/(.*)
    replacement: https://furyhawk.github.io/124c41/$1
    permanent: true
