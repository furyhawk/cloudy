            - name: OSRM_THREADS
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: OSRM_THREADS
            - name: OSRM_PORT
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: OSRM_PORT
            - name: OSRM_PROFILE
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: OSRM_PROFILE
            - name: OSRM_MAP_NAME
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: OSRM_MAP_NAME
            - name: OSRM_GEOFABRIK_PATH
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: OSRM_GEOFABRIK_PATH
            - name: OSRM_NOTIFY_FILEPATH
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: OSRM_NOTIFY_FILEPATH
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: DOMAIN

---

apiVersion: v1
kind: Service
metadata:
  name: osrm-backend
  namespace: swarm-converted
spec:
  selector:
    app: osrm-backend
  ports:
    - name: http
      port: 5000
      targetPort: http

---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: osrm-backend
  namespace: swarm-converted
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`osrm.REPLACE_DOMAIN`)
      middlewares:
        - name: rate-limit
      services:
        - name: osrm-backend
          port: 5000

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: swarm-converted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres-db
          image: postgres:16
          command:
            - postgres
            - -c
            - log_connections=on
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: swarm-converted-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swarm-converted-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: PGDATA
            - name: LANG
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: LANG
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: TZ
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data

---

apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: swarm-converted
spec:
  selector:
    app: postgres-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres

---

apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: postgres-db
  namespace: swarm-converted
spec:
  entryPoints:
    - postgres
  routes:
    - match: HostSNI(`*`)
      services:
        - name: postgres-db
          port: 5432

---

