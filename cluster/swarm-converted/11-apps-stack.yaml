apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: swarm-converted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: adminer
  template:
    metadata:
      labels:
        app: adminer
    spec:
      containers:
        - name: adminer
          image: adminer
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: swarm-converted-secret
                  key: PGADMIN_DEFAULT_EMAIL
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swarm-converted-secret
                  key: PGADMIN_DEFAULT_PASSWORD
            - name: PATH
              value: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: PYTHONPATH
              value: /pgadmin4
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: TZ
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: DOMAIN
            - name: ADMINER_DESIGN
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: ADMINER_DESIGN
          volumeMounts:
            - name: adminer-data
              mountPath: /var/lib/pgadmin
      volumes:
        - name: adminer-data
          persistentVolumeClaim:
            claimName: adminer-data

---

apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: swarm-converted
spec:
  selector:
    app: adminer
  ports:
    - name: http
      port: 8080
      targetPort: http

---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adminer
  namespace: swarm-converted
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`adminer.REPLACE_DOMAIN`) || Host(`dbadmin.REPLACE_DOMAIN`)
      services:
        - name: adminer
          port: 8080

---

