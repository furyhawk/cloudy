metadata:
  name: resume-redirect
  namespace: swarm-converted
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`resume.REPLACE_DOMAIN`)
      middlewares:
        - name: redirect-resume
      services:
        - name: site-server
          port: 80

---

apiVersion: traefik.io/v1alpha1
