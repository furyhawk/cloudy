apiVersion: apps/v1
kind: Deployment
metadata:
  name: site-server
  namespace: swarm-converted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site-server
  template:
    metadata:
      labels:
        app: site-server
    spec:
      containers:
        - name: site-server
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: site-content
              mountPath: /usr/share/nginx/html
              readOnly: true
      volumes:
        - name: site-content
          persistentVolumeClaim:
            claimName: site-content

---

apiVersion: v1
kind: Service
metadata:
  name: site-server
  namespace: swarm-converted
spec:
  selector:
    app: site-server
  ports:
    - name: http
      port: 80
      targetPort: http

---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: site-server
  namespace: swarm-converted
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`REPLACE_DOMAIN`) || Host(`www.REPLACE_DOMAIN`) || Host(`info.REPLACE_DOMAIN`) || Host(`124c41.REPLACE_DOMAIN`)
      middlewares:
        - name: no-www
      services:
        - name: site-server
          port: 80

---

apiVersion: traefik.io/v1alpha1
