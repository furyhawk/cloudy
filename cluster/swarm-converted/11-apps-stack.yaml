apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamlit-bai
  namespace: swarm-converted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: streamlit-bai
  template:
    metadata:
      labels:
        app: streamlit-bai
    spec:
      containers:
        - name: streamlit-bai
          image: furyhawk/beyondallinfo:latest
          command:
            - sh
            - -c
          args:
            - streamlit run --server.port=$STREAMLIT_BAI_SERVER_PORT --server.address=0.0.0.0 --server.baseUrlPath=$BAI_LOCATION src/app.py
          ports:
            - containerPort: 8502
              name: http
          env:
            - name: DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: DOMAIN
            - name: STREAMLIT_BAI_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: STREAMLIT_BAI_SERVER_PORT
            - name: BAI_LOCATION
              valueFrom:
                configMapKeyRef:
                  name: swarm-converted-config
                  key: BAI_LOCATION
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: swarm-converted-secret
                  key: GROQ_API_KEY
          volumeMounts:
            - name: bai-cache
              mountPath: /app/cache
      volumes:
        - name: bai-cache
          persistentVolumeClaim:
            claimName: bai-cache

---

apiVersion: v1
kind: Service
metadata:
  name: streamlit-bai
  namespace: swarm-converted
spec:
  selector:
    app: streamlit-bai
  ports:
    - name: http
      port: 8502
      targetPort: http

---

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: streamlit-bai
  namespace: swarm-converted
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`bai.REPLACE_DOMAIN`)
      services:
        - name: streamlit-bai
          port: 8502

