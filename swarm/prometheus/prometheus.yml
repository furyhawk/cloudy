# Prometheus configuration for the Swarm stack.
# Mounted into the Prometheus container as a Docker config.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape Traefik Prometheus metrics
  # Both services are on the traefik-public overlay network.
  # Traefik is in the 'core' stack; scrape via service VIP for stability.
  # Metrics are served on the dedicated "metrics" entrypoint (port 8082).
  - job_name: 'traefik'
    static_configs:
      - targets: ['192.168.50.220:8082']

  # Scrape CrowdSec metrics.
  # CrowdSec joins the traefik-public network in swarm/crowdsec.yml.
  # Use task DNS with the fully qualified Swarm service name.
  - job_name: 'crowdsec'
    metrics_path: /metrics
    static_configs:
      - targets: ['tasks.crowdsec_crowdsec:6060']
