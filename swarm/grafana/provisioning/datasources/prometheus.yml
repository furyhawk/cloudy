# Provisioning config for the Prometheus datasource in Grafana.
# The service VIP for 'prometheus' on traefik-public is not reliably routing
# in this stack, so use task DNS to reach the live Prometheus task directly.
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://tasks.prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      graphiteVersion: "1.1"
      tlsAuth: false
      tlsAuthWithCACert: false